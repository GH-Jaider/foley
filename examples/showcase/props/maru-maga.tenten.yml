# maru-maga.tenten.yml — «La maga» · pieza coop
#
# maru encuentra el gorro de maga en su estudio, toma la varita y se
# teletransporta al campo — donde koten y tenbo pastaban tan tranquilos.
# koten se cae (obvio). tenbo la escanea, no le parece, y sigue comiendo.
#
# LA LEY DE ESTA PIEZA (el límite coop): el arte clave lo posó el humano
# en el Studio — docs/design/maru-maga-muestra.tenten.yml es la copia
# canónica (gorro, varita, y la pose de maru con la varita en la mano).
# El agente midió, derivó y animó. Guion: docs/design/maru-maga.md
#
# ── planilla ──────────────────────────────────────────────────────────
# · elenco FULL-FINE a 2×: arte en px finos, `at`/offsets en px base
# · maru 40×18 (arte 36×18): tallitos filas 0-1 int., ojos 2-5, panza L,
#   pies 16-17. Pose varita: brazo alzado der (filas int. 6-7), pie der
#   recogido — VERBATIM de la muestra del humano
# · gorro 36×24: arte con padding interno (1,1) — el puesto canónico es
#   maru.bbox + (+1,−17) FINE (impar) ⇒ capa en maru.at + (0,−9) BASE.
#   Va DETRÁS de maru: tallitos y ojos delante del ala. Delta de cabeza
#   por frame de maru: corre-b +1 · agachada/arranca +2 · resto 0
# · varita 14×12 DELANTE de maru: alzada = maru.at + (17,−2) · reposo
#   (en la mano, brazo abajo) = maru.at + (15,+1) · x = con destello ·
#   tenue = sin él
# · koten2 26×24 (koten 2×, ojos e): mira DERECHA; susto/tiesa/espia
#   canónicos; pasta-a/b = derivada (cabeza baja 5 filas base, barbita
#   al suelo; mordisco = ±1 fila)
# · tenbo2 22×24 (tenbo 2× ESPEJADA, ojos f): mira IZQUIERDA (hacia el
#   centro); escaneo/esquiva/asoma canónicos espejados; pasta derivada
# · bola: el remolino del teleport — disco G, banda-ecuador p (el gorro
#   envolviéndola), S viajera + brillo L (el giro lo venden las fases)
# · suelo de AMBOS actos: línea fine y=168 (pies del elenco en 166-167)
# · T1 = 12496 ms (tick 781) · ciclo total = 23696 ms (1481 ticks)
