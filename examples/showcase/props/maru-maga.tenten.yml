layers:
  # ═══ ACTO 1 · EL ESTUDIO DE LA MAGA (0–781) — noche, vela, luna ═══
  - type: generator
    use: tonemap
    at: { x: 0, y: 0 }
    fine: true
    window: { until: 781 }
    params:
      width: 320
      rows: 192
      ramp: [a, b, c, d]
      noise: 0.08
      shapes:
        # ── piso ─────────────────────────────────────────────────────
        - { shape: line, from: [0, 168], to: [319, 168], tone: 0.65 }
        - { shape: rect, at: [0, 170], size: [320, 22], tone: [0.1, 0.22], id: suelo }
        # ── estantería de pociones (izquierda) ───────────────────────
        - { shape: rect, at: [8, 60], size: [56, 108], tone: 0.65, stroke: 2, id: estanteria }
        - { shape: line, from: [10, 96], to: [62, 96], tone: 0.65, w: 2 }
        - { shape: line, from: [10, 132], to: [62, 132], tone: 0.65, w: 2 }
        - { shape: rect, at: [14, 74], size: [8, 20], tone: 0.4 }      # frascos (fila alta)
        - { shape: ellipse, at: [26, 80], size: [10, 14], tone: 0.65 }
        - { shape: rect, at: [40, 70], size: [7, 24], tone: 0.9 }
        - { shape: ellipse, at: [50, 84], size: [8, 10], tone: 0.4, pulse: { amp: 0.15, ticks: 90 } } # poción burbujeante
        - { shape: rect, at: [14, 112], size: [10, 18], tone: 0.65 }   # fila media
        - { shape: rect, at: [27, 116], size: [8, 14], tone: 0.4 }
        - { shape: ellipse, at: [38, 114], size: [9, 16], tone: 0.65 }
        - { shape: rect, at: [50, 108], size: [8, 22], tone: 0.4 }
        - { shape: rect, at: [14, 146], size: [16, 20], tone: 0.4, stroke: 1 } # caja
        - { shape: rect, at: [34, 152], size: [24, 14], tone: 0.35 }   # papeles
        # ── la vela sobre la estantería (llama que late) ─────────────
        - { shape: rect, at: [30, 48], size: [6, 12], tone: 0.9, id: vela }
        - { shape: ellipse, at: [29, 36], size: [7, 10], tone: 0.35, pulse: { amp: 0.25, ticks: 45 }, id: llama }
        # ── la percha del gorro (centro) ─────────────────────────────
        - { shape: line, from: [128, 76], to: [128, 166], tone: 0.65, w: 2, id: percha }
        - { shape: rect, at: [126, 74], size: [6, 4], tone: 0.65 }     # perilla
        - { shape: ellipse, at: [118, 162], size: [22, 8], tone: 0.65 } # base
        # ── la mesita de la varita (derecha) ─────────────────────────
        - { shape: rect, at: [224, 138], size: [44, 5], tone: 0.9, id: mesita }
        - { shape: rect, at: [228, 143], size: [4, 25], tone: 0.65 }   # patas
        - { shape: rect, at: [258, 143], size: [4, 25], tone: 0.65 }
        # ── ventana redonda con la luna ──────────────────────────────
        - { shape: ellipse, at: [242, 16], size: [60, 60], tone: 0.65, stroke: 2, id: ventana }
        - { shape: ellipse, at: [262, 30], size: [14, 14], tone: 0.5, id: luna }
        # ── cuadro entre percha y mesita ─────────────────────────────
        - { shape: rect, at: [176, 84], size: [18, 22], tone: 0.65, stroke: 1, id: cuadro }
        - { shape: line, from: [180, 98], to: [190, 90], tone: 0.35 }
      anchors:
        piso: 168
        percha: [118, 74, 22, 94]
        mesita: [224, 138, 44, 30]
        ventana: [242, 16, 60, 60]
        estanteria: [8, 60, 56, 108]
  # elenco del acto 1 (el gorro DETRÁS de maru: ojos delante del ala)
  - { type: sprite, use: gorro, timeline: gorro-a1, at: { x: 56, y: 27 }, fine: true, window: { until: 781 } }
  - { type: sprite, use: maru, timeline: maru-a1, at: { x: 20, y: 75 }, fine: true, window: { until: 781 } }
  - { type: sprite, use: varita, timeline: varita-a1, at: { x: 118, y: 64 }, fine: true, window: { until: 781 } }
  - { type: sprite, use: bola, timeline: bola-a1, at: { x: 104, y: 59 }, fine: true, window: { until: 781 } }
  - { type: sprite, use: halo, timeline: halo-a1, at: { x: 98, y: 67 }, fine: true, window: { until: 781 } }

  # ═══ ACTO 2 · EL CAMPO (781–fin) — día, sol, nubes en deriva ═════
  - type: generator
    use: tonemap
    at: { x: 0, y: 0 }
    fine: true
    window: { from: 781 }
    params:
      width: 320
      rows: 192
      ramp: [a, b, c, d]
      noise: 0.1
      shimmerTicks: 180
      shapes:
        # ── piso (el MISMO suelo del estudio: mundo consistente) ─────
        - { shape: line, from: [0, 168], to: [319, 168], tone: 0.65 }
        - { shape: rect, at: [0, 170], size: [320, 22], tone: [0.12, 0.25], id: suelo }
        # ── colinas del horizonte ────────────────────────────────────
        - { shape: poly, pts: [[0, 168], [60, 120], [140, 168]], tone: 0.15 }
        - { shape: poly, pts: [[100, 168], [200, 112], [300, 168]], tone: 0.12 }
        - { shape: poly, pts: [[240, 168], [320, 132], [320, 168]], tone: 0.18 }
        # ── el sol con sus rayos ─────────────────────────────────────
        - { shape: ellipse, at: [30, 18], size: [22, 22], tone: 0.4, id: sol }
        - { shape: line, from: [41, 8], to: [41, 12], tone: 0.4 }
        - { shape: line, from: [41, 44], to: [41, 48], tone: 0.4 }
        - { shape: line, from: [12, 29], to: [16, 29], tone: 0.4 }
        - { shape: line, from: [66, 29], to: [70, 29], tone: 0.4 }
        - { shape: line, from: [20, 14], to: [23, 17], tone: 0.4 }
        - { shape: line, from: [59, 41], to: [62, 44], tone: 0.4 }
        - { shape: line, from: [20, 44], to: [23, 41], tone: 0.4 }
        - { shape: line, from: [59, 17], to: [62, 14], tone: 0.4 }
        # ── matas lejanas (guiones en el suelo) ──────────────────────
        - { shape: line, from: [80, 150], to: [84, 150], tone: 0.3 }
        - { shape: line, from: [170, 144], to: [174, 144], tone: 0.28 }
        - { shape: line, from: [230, 152], to: [234, 152], tone: 0.3 }
        - { shape: line, from: [120, 158], to: [123, 158], tone: 0.3 }
        - { shape: line, from: [280, 148], to: [283, 148], tone: 0.28 }
      anchors:
        piso: 168
  - type: generator # nube cercana (deriva)
    use: backdrop
    at: { x: 16, y: 10 }
    fine: true
    window: { from: 781 }
    params: { width: 120, rows: 36, ramp: [a, b, c], kind: cumulus, span: 64, scrollTicks: 26 }
  - type: generator # nube lejana (parallax: más lenta)
    use: backdrop
    at: { x: 180, y: 22 }
    fine: true
    window: { from: 781 }
    params: { width: 100, rows: 28, ramp: [a, b, c], kind: cumulus, span: 56, scrollTicks: 40 }
  # pasto de fondo (detrás del elenco) — koten y tenbo pastan del suyo
  - { type: sprite, use: pasto, timeline: pasto-1, at: { x: 28, y: 80 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: pastito, timeline: pasto-2, at: { x: 46, y: 81 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: pasto, timeline: pasto-3, at: { x: 95, y: 80 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: pastito, timeline: pasto-4, at: { x: 110, y: 81 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: pasto, timeline: pasto-5, at: { x: 145, y: 80 }, fine: true, window: { from: 781 } }
  # elenco del acto 2
  - { type: sprite, use: koten2, timeline: koten-a2, at: { x: 37, y: 72 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: tenbo2, timeline: tenbo-a2, at: { x: 112, y: 72 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: gorro, timeline: gorro-a2, at: { x: 71, y: 66 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: maru, timeline: maru-a2, at: { x: 71, y: 75 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: varita, timeline: varita-a2, at: { x: 88, y: 73 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: bola, timeline: bola-a2, at: { x: 74, y: 54 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: halo, timeline: halo-a2, at: { x: 68, y: 48 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: polvo, timeline: polvo-i, at: { x: 67, y: 81 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: polvo, timeline: polvo-d, at: { x: 76, y: 81 }, fine: true, window: { from: 781 } }
  # pasto de primer término (DELANTE del elenco)
  - { type: sprite, use: pasto, timeline: pasto-6, at: { x: 60, y: 86 }, fine: true, window: { from: 781 } }
  - { type: sprite, use: pastito, timeline: pasto-7, at: { x: 126, y: 86 }, fine: true, window: { from: 781 } }

  # ═══ el reloj maestro (siempre visible; 1px transparente) ════════
  - { type: sprite, use: marca, timeline: guion, at: { x: 0, y: 0 } }
  - { type: sprite, use: marca, timeline: banda, at: { x: 0, y: 0 } }

